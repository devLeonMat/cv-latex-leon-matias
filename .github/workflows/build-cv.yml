name: Build CV PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to create releases and upload assets

jobs:
  build:
    name: Compile LaTeX CV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile PDF with XeLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          compiler: xelatex
          args: "-interaction=nonstopmode -shell-escape"
          extra_system_packages: "fontawesome5 cm-super"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-roslin-leon-matias
          path: main.pdf
          if-no-files-found: error

      - name: Create / update Release with latest PDF
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Latest CV"
          body: |
            Automatically compiled PDF of the CV.
            Built from commit ${{ github.sha }} on ${{ github.run_id }}.
          artifacts: "main.pdf"
          artifactContentType: "application/pdf"
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
