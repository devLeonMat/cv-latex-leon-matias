name: Build CV PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # Allow manual trigger from the GitHub UI

permissions:
  contents: write       # Required to create/update Releases

jobs:
  build:
    name: Compile LaTeX CV with XeLaTeX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile resume.tex with XeLaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          compiler: xelatex
          args: "-interaction=nonstopmode -halt-on-error -shell-escape"
          # Install Source Sans 3 font (via TeX Live package: sourcesanspro)
          extra_packages: "sourcesanspro"

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-roslin-leon-matias
          path: resume.pdf
          if-no-files-found: error
          retention-days: 90

      - name: Create or update "latest" GitHub Release with PDF
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          tag: "latest"
          name: "Latest Resume — Roslin Leon Matias"
          body: |
            **Roslin Leon Matias — Lead Software Engineer**

            Automatically compiled PDF from the latest commit.

            - Commit: `${{ github.sha }}`
            - Build: `${{ github.run_id }}`
            - Compiled with: XeLaTeX + Source Sans 3

            [View all releases](https://github.com/devLeonMat/cv-latex-leon-matias/releases)
          artifacts: "resume.pdf"
          artifactContentType: "application/pdf"
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
